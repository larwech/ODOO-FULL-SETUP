version: "3.8"

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  odoo:
    build: .
    restart: always
    depends_on:
      - db
      - redis
    command: odoo --proxy-mode --workers=4 --max-cron-threads=2
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo

  nginx:
    image: nginx:latest
    restart: always
    depends_on:
      - odoo
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
  db-data:
  odoo-data
